<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturday Brunch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF6EF;
    --warm-white: #FFFDF9;
    --terracotta: #C4623A;
    --terra-light: #F0C4A8;
    --terra-pale: #FBF0E8;
    --sage: #7A9E7E;
    --sage-light: #C8DEC9;
    --sage-pale: #EFF6EF;
    --mustard: #D4A017;
    --ink: #2C2417;
    --ink-mid: #5A4F3E;
    --ink-soft: #9B8F7E;
    --border: rgba(44,36,23,0.10);
    --radius: 16px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ---- HERO ---- */
  .hero {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 2.25rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(196,98,58,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 75%, rgba(122,158,126,0.09) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 50% 50%, rgba(212,160,23,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 0.6rem;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    font-weight: 400;
    color: var(--ink);
    line-height: 1.1;
    white-space: nowrap;
    cursor: default;
    user-select: none;
  }
  .hero-divider {
    width: 40px; height: 2px;
    background: linear-gradient(90deg, var(--terracotta), var(--mustard));
    border-radius: 2px;
    margin: 1.1rem auto 0;
  }

  /* ---- LAYOUT ---- */
  .page-body {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.75rem 1.5rem 3rem;
  }

  /* Desktop: 3 columns */
  .three-col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.25rem;
    align-items: start;
  }

  /* Mobile: single column */
  @media (max-width: 860px) {
    .three-col {
      grid-template-columns: 1fr;
    }
    .page-body {
      max-width: 560px;
      padding: 1.5rem 1.25rem 3rem;
    }
  }

  .col { display: flex; flex-direction: column; gap: 1.25rem; }

  /* ---- CARDS ---- */
  .card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1.5rem;
  }
  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ---- DETAILS ---- */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .info-item { background: var(--cream); border-radius: 10px; padding: 0.85rem 1rem; }
  .info-item-icon { font-size: 18px; margin-bottom: 0.3rem; display: block; }
  .info-item-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 0.2rem; }
  .info-item-value { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .info-item-value.editable-date { color: var(--terracotta); font-family: var(--font-display); font-size: 15px; }

  /* ---- MENU ---- */
  #menu-list { display: flex; flex-direction: column; }
  .menu-item { display: flex; align-items: baseline; gap: 9px; font-size: 14px; color: var(--ink-mid); padding: 0.35rem 0; border-bottom: 1px dashed var(--border); }
  .menu-item:last-child { border-bottom: none; }
  .menu-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--terracotta); flex-shrink: 0; margin-top: 7px; }
  .menu-item-name { flex: 1; }
  .menu-item-note { font-size: 11px; color: var(--ink-soft); font-style: italic; }

  /* ---- BRING ---- */
  .bring-note { background: var(--sage-pale); border: 1px solid var(--sage-light); border-radius: 10px; padding: 0.8rem 1rem; font-size: 13px; color: var(--ink-mid); line-height: 1.5; }
  .bring-note strong { color: var(--sage); font-weight: 500; }

  /* ---- RSVP ---- */
  .rsvp-question { text-align: center; margin-bottom: 1rem; }
  .rsvp-question p { font-family: var(--font-display); font-size: 1.1rem; color: var(--ink); margin-bottom: 0.65rem; }
  .rsvp-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 0.9rem; flex-wrap: wrap; }
  .rsvp-btn { padding: 9px 1.5rem; border-radius: 100px; border: 1.5px solid var(--border); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; background: transparent; color: var(--ink-mid); }
  .rsvp-btn:hover { transform: translateY(-1px); }
  .rsvp-btn.yes { border-color: var(--sage); color: var(--sage); }
  .rsvp-btn.yes:hover, .rsvp-btn.yes.active { background: var(--sage); color: white; }
  .rsvp-btn.no { border-color: var(--terracotta); color: var(--terracotta); }
  .rsvp-btn.no:hover, .rsvp-btn.no.active { background: var(--terracotta); color: white; }

  .rsvp-form { display: none; flex-direction: column; gap: 0.65rem; animation: fadeIn 0.2s ease; }
  .rsvp-form.visible { display: flex; }
  .rsvp-row { display: flex; gap: 8px; }
  .rsvp-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-body); font-size: 14px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.15s; min-width: 0; }
  .rsvp-input:focus { border-color: var(--sage); }
  .rsvp-input::placeholder { color: var(--ink-soft); }
  select.rsvp-input { cursor: pointer; }
  .rsvp-submit { padding: 10px 1.25rem; background: var(--terracotta); color: white; border: none; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s; align-self: flex-end; }
  .rsvp-submit:hover { opacity: 0.88; transform: translateY(-1px); }
  .rsvp-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .rsvp-decline-msg { display: none; text-align: center; font-family: var(--font-display); font-style: italic; color: var(--ink-soft); font-size: 0.95rem; padding: 0.4rem 0; animation: fadeIn 0.2s ease; }
  .rsvp-decline-msg.visible { display: block; }
  .rsvp-success { display: none; background: var(--sage-pale); border: 1px solid var(--sage-light); border-radius: 10px; padding: 0.9rem 1.1rem; text-align: center; animation: fadeIn 0.25s ease; }
  .rsvp-success.visible { display: block; }
  .rsvp-success p { font-size: 14px; color: var(--ink-mid); }
  .rsvp-success strong { color: var(--sage); }
  .rsvp-change { margin-top: 0.4rem; font-size: 12px; color: var(--ink-soft); text-decoration: underline; cursor: pointer; background: none; border: none; font-family: var(--font-body); }

  /* ---- GUEST LIST ---- */
  .guest-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .guest-empty { text-align: center; font-style: italic; color: var(--ink-soft); font-size: 13px; padding: 0.5rem 0; }
  .guest-item { display: flex; align-items: center; gap: 9px; padding: 0.5rem 0.65rem; background: var(--cream); border-radius: 8px; animation: fadeIn 0.2s ease; }
  .guest-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--terra-pale); border: 1.5px solid var(--terra-light); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; color: var(--terracotta); flex-shrink: 0; text-transform: uppercase; }
  .guest-info { flex: 1; }
  .guest-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .guest-plus { font-size: 11px; color: var(--ink-soft); }
  .guest-count-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--terra-pale); border: 1px solid var(--terra-light); color: var(--terracotta); font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 100px; margin-bottom: 0.65rem; }

  .loading-indicator { text-align: center; font-size: 13px; color: var(--ink-soft); padding: 0.75rem 0; }

  /* ---- ADMIN PANEL ---- */
  #admin-panel {
    display: none;
    background: var(--warm-white);
    border: 1px dashed rgba(196,98,58,0.3);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 1.25rem;
    animation: fadeIn 0.25s ease;
  }
  #admin-panel.visible { display: block; }
  #admin-panel h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; color: var(--ink); margin-bottom: 1rem; }
  .admin-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 0.75rem; }
  .admin-field label { font-size: 11px; color: var(--ink-soft); font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
  .admin-field input, .admin-field textarea { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font-body); font-size: 14px; background: var(--cream); color: var(--ink); outline: none; }
  .admin-field input:focus, .admin-field textarea:focus { border-color: var(--terracotta); }
  .admin-field textarea { min-height: 80px; resize: vertical; }
  .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.75rem; }
  .admin-btn { padding: 8px 1.1rem; border-radius: 8px; border: 1.5px solid var(--border); font-family: var(--font-body); font-size: 13px; cursor: pointer; background: transparent; color: var(--ink-mid); transition: background 0.12s; }
  .admin-btn:hover { background: var(--cream); }
  .admin-btn.primary { background: var(--terracotta); color: white; border-color: var(--terracotta); }
  .admin-btn.primary:hover { opacity: 0.88; }
  .admin-btn.danger { color: #b53a2f; border-color: rgba(181,58,47,0.3); }
  .admin-btn.danger:hover { background: #fdf0ef; }
  .admin-section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); margin: 1.25rem 0 0.75rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .admin-status { font-size: 12px; color: var(--sage); margin-top: 0.5rem; min-height: 18px; }

  /* Invisible hotspot */
  #hotspot { position: fixed; bottom: 0; right: 0; width: 28px; height: 28px; cursor: default; z-index: 9999; background: transparent; }

  footer { text-align: center; padding: 1rem; font-size: 12px; color: var(--ink-soft); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header class="hero">
  <p class="hero-eyebrow">You're invited</p>
  <h1 id="hero-title">Saturday Brunch</h1>
  <div class="hero-divider"></div>
</header>

<div class="page-body">
  <div class="three-col">

    <!-- Column 1: Details + RSVP -->
    <div class="col">
      <div class="card">
        <p class="card-label">Details</p>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-item-icon">🗓</span>
            <p class="info-item-label">When</p>
            <p class="info-item-value editable-date" id="display-date">—</p>
          </div>
          <div class="info-item">
            <span class="info-item-icon">📍</span>
            <p class="info-item-label">Where</p>
            <a class="info-item-value" id="display-location"
               href="https://maps.app.goo.gl/iUBwZLupPzzySSoBA"
               target="_blank" rel="noopener"
               style="color:inherit;text-decoration:underline;text-decoration-color:var(--terra-light);cursor:pointer;display:block;">—</a>
          </div>
        </div>
      </div>

      <div class="card">
        <p class="card-label">RSVP</p>
        <div id="rsvp-existing" style="display:none;">
          <div class="rsvp-success visible">
            <p id="rsvp-existing-msg"></p>
            <button class="rsvp-change" onclick="clearMyRsvp()">Change my response</button>
          </div>
        </div>
        <div id="rsvp-new">
          <div class="rsvp-question">
            <p>Will you be joining us?</p>
            <div class="rsvp-buttons">
              <button class="rsvp-btn yes" onclick="selectRsvp('yes')">Yes, I'll be there ✓</button>
              <button class="rsvp-btn no" onclick="selectRsvp('no')">Can't make it</button>
            </div>
          </div>
          <div class="rsvp-decline-msg" id="decline-msg">
            <p>No worries — hope to see you next month! 🌿</p>
          </div>
          <form class="rsvp-form" id="rsvp-form" onsubmit="submitRsvp(event)">
            <div class="rsvp-row">
              <input type="text" class="rsvp-input" id="rsvp-name" placeholder="Your name" required autocomplete="given-name">
              <select class="rsvp-input" id="rsvp-headcount" style="max-width:110px;">
                <option value="1">Just me</option>
                <option value="2">Me + 1</option>
                <option value="3">Me + 2</option>
                <option value="4">Me + 3</option>
              </select>
            </div>
            <button type="submit" class="rsvp-submit" id="rsvp-submit-btn">Confirm RSVP →</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Column 2: Menu + What to bring -->
    <div class="col">
      <div class="card">
        <p class="card-label">Menu</p>
        <div id="menu-list"><p class="loading-indicator">Loading…</p></div>
      </div>

      <div class="card">
        <p class="card-label">What to bring</p>
        <div class="bring-note" id="display-bring"></div>
      </div>
    </div>

    <!-- Column 3: Guest list -->
    <div class="col">
      <div class="card">
        <p class="card-label">Who's coming</p>
        <div id="guest-count-area"></div>
        <div class="guest-list" id="guest-list">
          <p class="loading-indicator">Loading…</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Admin panel — hidden, full width below columns -->
  <div id="admin-panel">
    <h3>Host settings</h3>

    <p class="admin-section-title">Page content</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="admin-field">
        <label>Date & time</label>
        <input type="text" id="admin-date" placeholder="Saturday, May 17 · 11:00 AM">
      </div>
      <div class="admin-field">
        <label>Location display text</label>
        <input type="text" id="admin-location" placeholder="12 Elm Street, Apt 4">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="admin-field">
        <label>Menu — one item per line, note after dash</label>
        <textarea id="admin-menu" placeholder="Eggs Benedict&#10;Avocado toast - vegan option&#10;Mimosas"></textarea>
      </div>
      <div class="admin-field">
        <label>What to bring note</label>
        <textarea id="admin-bring"></textarea>
      </div>
    </div>
    <div class="admin-actions">
      <button class="admin-btn primary" onclick="saveAdminSettings()">Save & publish</button>
    </div>
    <div class="admin-status" id="admin-status"></div>

    <p class="admin-section-title">Guest list</p>
    <div id="admin-guest-summary" style="font-size:13px;color:var(--ink-mid);margin-bottom:0.75rem;"></div>
    <div class="admin-actions">
      <button class="admin-btn danger" onclick="resetGuestList()">Reset guest list after brunch</button>
    </div>
    <div class="admin-status" id="admin-reset-status"></div>
  </div>
</div>

<div id="hotspot"></div>
<footer><p>See you Saturday ☀️</p></footer>

<script>
  const BIN_ID  = '69dcb2a8856a6821892a9eb4';
  const API_KEY = '$2a$10$NMkk/khZu4tVrBQZw2rYtedlIuaKEs8AU1h6ZdIInu2YEXYzaOYey';
  const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const MY_RSVP_KEY = 'my_brunch_rsvp';

  const DEFAULTS = {
    date:     'Saturday, May 17 · 11:00 AM',
    location: '12 Elm Street, Apt 4 — ring the bell',
    menu: [
      { name: 'Eggs Benedict', note: '' },
      { name: 'Avocado toast', note: 'vegan option available' },
      { name: 'Greek salad', note: '' },
      { name: 'Fresh fruit platter', note: '' },
      { name: 'Homemade cake', note: '' },
      { name: 'Mimosas & fresh juice', note: '' }
    ],
    bring: '🌿 <strong>Just bring yourself!</strong> If you feel like it, a bottle of wine, flowers, or a small treat is always lovely — but it is <em>absolutely not obligatory</em>. Seriously.',
    rsvps: []
  };

  /* ---- JSONBin: read/write the whole record ---- */
  async function fetchBin() {
    try {
      const res = await fetch(`${BIN_URL}/latest`, {
        headers: { 'X-Master-Key': API_KEY }
      });
      const json = await res.json();
      return Object.assign({}, DEFAULTS, json.record || {});
    } catch (e) {
      console.error('fetchBin failed', e);
      return Object.assign({}, DEFAULTS);
    }
  }

  async function putBin(data) {
    try {
      const res = await fetch(BIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify(data)
      });
      return res.ok;
    } catch (e) {
      console.error('putBin failed', e);
      return false;
    }
  }

  /* ---- Render ---- */
  function renderSettings(s) {
    document.getElementById('display-date').textContent     = s.date;
    document.getElementById('display-location').textContent = s.location;
    document.getElementById('display-bring').innerHTML      = s.bring;

    const menuItems = Array.isArray(s.menu) ? s.menu
      : s.menu.split('\n').filter(l => l.trim()).map(l => {
          const [name, ...rest] = l.split('-');
          return { name: name.trim(), note: rest.join('-').trim() };
        });

    document.getElementById('menu-list').innerHTML = menuItems.map(item => `
      <div class="menu-item">
        <span class="menu-dot"></span>
        <span class="menu-item-name">${item.name}</span>
        ${item.note ? `<span class="menu-item-note">${item.note}</span>` : ''}
      </div>`).join('');

    const adminDate  = document.getElementById('admin-date');
    const adminLoc   = document.getElementById('admin-location');
    const adminMenu  = document.getElementById('admin-menu');
    const adminBring = document.getElementById('admin-bring');
    if (adminDate)  adminDate.value  = s.date;
    if (adminLoc)   adminLoc.value   = s.location;
    if (adminBring) adminBring.value = s.bring.replace(/<[^>]+>/g, '');
    if (adminMenu)  adminMenu.value  = menuItems.map(i => i.note ? `${i.name} - ${i.note}` : i.name).join('\n');
  }

  function renderGuestList(rsvps) {
    const list      = document.getElementById('guest-list');
    const countArea = document.getElementById('guest-count-area');
    const attending = (rsvps || []).filter(r => r.attending);

    if (attending.length === 0) {
      list.innerHTML      = '<p class="guest-empty">No RSVPs yet — be the first!</p>';
      countArea.innerHTML = '';
      const s = document.getElementById('admin-guest-summary');
      if (s) s.textContent = 'No confirmed guests yet.';
      return;
    }

    const total = attending.reduce((sum, r) => sum + (r.headcount || 1), 0);
    countArea.innerHTML = `
      <div class="guest-count-badge">
        <span>✓</span>
        <span>${attending.length} confirmed · ${total} people total</span>
      </div>`;

    list.innerHTML = attending.map(r => {
      const initials = r.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const plus = r.headcount > 1 ? `+${r.headcount - 1} guest${r.headcount > 2 ? 's' : ''}` : '';
      return `
        <div class="guest-item">
          <div class="guest-avatar">${initials}</div>
          <div class="guest-info">
            <p class="guest-name">${r.name}</p>
            ${plus ? `<p class="guest-plus">${plus}</p>` : ''}
          </div>
        </div>`;
    }).join('');

    const s = document.getElementById('admin-guest-summary');
    if (s) s.textContent = `${attending.length} confirmed · ${total} people total.`;
  }

  /* ---- Init ---- */
  async function init() {
    const data = await fetchBin();
    renderSettings(data);
    renderGuestList(data.rsvps);

    const stored = localStorage.getItem(MY_RSVP_KEY);
    if (stored) {
      const r = JSON.parse(stored);
      document.getElementById('rsvp-new').style.display      = 'none';
      document.getElementById('rsvp-existing').style.display = 'block';
      document.getElementById('rsvp-existing-msg').innerHTML = r.attending
        ? `<strong>You're confirmed!</strong> See you there, ${r.name} 🎉`
        : `You've declined this one, ${r.name}. Hope to see you next time!`;
    }
  }

  /* ---- RSVP ---- */
  let selectedAttending = null;

  function selectRsvp(choice) {
    selectedAttending = choice === 'yes';
    document.querySelectorAll('.rsvp-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.rsvp-btn.${choice}`).classList.add('active');
    if (selectedAttending) {
      document.getElementById('rsvp-form').classList.add('visible');
      document.getElementById('decline-msg').classList.remove('visible');
    } else {
      document.getElementById('rsvp-form').classList.remove('visible');
      document.getElementById('decline-msg').classList.add('visible');
      localStorage.setItem(MY_RSVP_KEY, JSON.stringify({ attending: false, name: 'Guest' }));
    }
  }

  async function submitRsvp(e) {
    e.preventDefault();
    const name      = document.getElementById('rsvp-name').value.trim();
    const headcount = parseInt(document.getElementById('rsvp-headcount').value);
    if (!name) return;

    const btn = document.getElementById('rsvp-submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    const data = await fetchBin();
    data.rsvps = data.rsvps || [];
    data.rsvps.push({ name, headcount, attending: true, ts: Date.now() });
    const ok = await putBin(data);

    if (ok) {
      localStorage.setItem(MY_RSVP_KEY, JSON.stringify({ attending: true, name }));
      document.getElementById('rsvp-new').style.display      = 'none';
      document.getElementById('rsvp-existing').style.display = 'block';
      document.getElementById('rsvp-existing-msg').innerHTML =
        `<strong>You're confirmed!</strong> See you there, ${name} 🎉`;
      renderGuestList(data.rsvps);
    } else {
      btn.disabled    = false;
      btn.textContent = 'Confirm RSVP →';
      alert('Something went wrong. Please try again.');
    }
  }

  function clearMyRsvp() {
    localStorage.removeItem(MY_RSVP_KEY);
    selectedAttending = null;
    document.getElementById('rsvp-existing').style.display = 'none';
    document.getElementById('rsvp-new').style.display      = 'block';
    document.querySelectorAll('.rsvp-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('rsvp-form').classList.remove('visible');
    document.getElementById('decline-msg').classList.remove('visible');
    document.getElementById('rsvp-name').value = '';
    const btn = document.getElementById('rsvp-submit-btn');
    btn.disabled    = false;
    btn.textContent = 'Confirm RSVP →';
  }

  /* ---- Admin ---- */
  async function saveAdminSettings() {
    const statusEl = document.getElementById('admin-status');
    statusEl.textContent = 'Saving…';

    const data = await fetchBin();
    const dateVal  = document.getElementById('admin-date').value.trim();
    const locVal   = document.getElementById('admin-location').value.trim();
    const menuVal  = document.getElementById('admin-menu').value.trim();
    const bringVal = document.getElementById('admin-bring').value.trim();

    if (dateVal)  data.date     = dateVal;
    if (locVal)   data.location = locVal;
    if (bringVal) data.bring    = bringVal;
    if (menuVal) {
      data.menu = menuVal.split('\n').filter(l => l.trim()).map(l => {
        const [name, ...rest] = l.split('-');
        return { name: name.trim(), note: rest.join('-').trim() };
      });
    }

    const ok = await putBin(data);
    if (ok) {
      renderSettings(data);
      statusEl.textContent = 'Saved! All visitors will see the updated content.';
      setTimeout(() => { statusEl.textContent = ''; }, 4000);
    } else {
      statusEl.textContent = 'Save failed. Please try again.';
      statusEl.style.color = 'var(--terracotta)';
    }
  }

  async function resetGuestList() {
    if (!confirm('Reset the guest list? Use this after the brunch is over. Cannot be undone.')) return;
    const statusEl = document.getElementById('admin-reset-status');
    statusEl.textContent = 'Resetting…';

    const data = await fetchBin();
    data.rsvps = [];
    const ok = await putBin(data);

    if (ok) {
      localStorage.removeItem(MY_RSVP_KEY);
      renderGuestList([]);
      clearMyRsvp();
      statusEl.textContent = 'Guest list cleared. Ready for next month!';
      setTimeout(() => { statusEl.textContent = ''; }, 4000);
    } else {
      statusEl.textContent = 'Something went wrong. Please try again.';
      statusEl.style.color = 'var(--terracotta)';
    }
  }

  /* ---- Admin unlock sequence ----
     ?host in URL  → enables sequence
     Title ×5 fast → arms hotspot
     Hotspot click → reveals panel
  ---------------------------------------- */
  const hostModeEnabled = new URLSearchParams(window.location.search).has('host');
  let titleClicks  = 0;
  let clickTimer   = null;
  let hotspotArmed = false;

  document.getElementById('hero-title').addEventListener('click', () => {
    if (!hostModeEnabled) return;
    titleClicks++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { titleClicks = 0; }, 1000);
    if (titleClicks >= 5) {
      titleClicks  = 0;
      hotspotArmed = true;
      clearTimeout(clickTimer);
    }
  });

  document.getElementById('hotspot').addEventListener('click', () => {
    if (!hostModeEnabled || !hotspotArmed) return;
    hotspotArmed = false;
    const panel = document.getElementById('admin-panel');
    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  init();
</script>
</body>
</html>
